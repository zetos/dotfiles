# Leave both imports commented to use Alacritty's default colors. Uncomment
# exactly one import to use that theme. Window opacity applies to every theme.
[general]
import = ["~/.config/alacritty/themes/nord.toml"]
# import = ["~/.config/alacritty/themes/night-owl.toml"]

[window]
opacity = 0.3
padding.x = 10
padding.y = 10
decorations = "Full"

[font]
normal.family = "Iosevka Nerd Font Mono"
bold.family = "Iosevka Nerd Font Mono"
italic.family = "Iosevka Nerd Font Mono"
bold_italic.family = "Iosevka Nerd Font Mono"
size = 13.0
